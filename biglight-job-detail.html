<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>求人票｜BIGLIGHT JOB</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=Inter:wght@600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --red:#D02E26;--red-d:#A8231C;--red-soft:#FDECEA;
  --ink:#16181D;--gray:#5B6472;--gray-2:#9AA2AE;--line:#ECECEF;--bg:#F7F8FA;
  --green:#1F9D55;--green-soft:#E6F6EC;--amber:#E8810C;--amber-soft:#FFF3E2;
  --blue:#2563EB;--blue-soft:#E8F0FE;
  --shadow:0 1px 2px rgba(16,24,40,.04),0 8px 24px rgba(16,24,40,.08);
  --radius:18px;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'Noto Sans JP','Inter',system-ui,sans-serif;background:var(--bg);color:var(--ink);font-size:15px;line-height:1.75;-webkit-font-smoothing:antialiased}
button{font-family:inherit;cursor:pointer;border:none;background:none}
a{color:inherit;text-decoration:none}
img{display:block;max-width:100%}
.wrap{max-width:920px;margin:0 auto;padding:0 20px}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;font-weight:700;border-radius:12px;padding:12px 22px;font-size:15px;transition:.16s;white-space:nowrap}
.btn-red{background:var(--red);color:#fff;box-shadow:0 8px 20px rgba(208,46,38,.30)}
.btn-red:hover{background:var(--red-d);transform:translateY(-2px)}
.btn-ghost{background:#fff;border:1.5px solid var(--line);color:var(--ink)}
.btn-ghost:hover{border-color:var(--gray-2)}
.btn-lg{padding:15px 30px;font-size:16px;border-radius:14px}
.btn-sm{padding:9px 16px;font-size:13.5px}
.chip{display:inline-flex;align-items:center;gap:5px;font-size:12.5px;font-weight:700;padding:5px 11px;border-radius:20px;background:var(--bg);color:var(--gray)}
.chip.green{background:var(--green-soft);color:var(--green)}
.chip.amber{background:var(--amber-soft);color:var(--amber)}
.chip.blue{background:var(--blue-soft);color:var(--blue)}
.chip.red{background:var(--red-soft);color:var(--red)}

/* Header */
header{position:sticky;top:0;z-index:40;background:rgba(255,255,255,.92);backdrop-filter:blur(10px);border-bottom:1px solid var(--line)}
.nav{display:flex;align-items:center;gap:12px;height:62px;max-width:920px;margin:0 auto;padding:0 20px}
.logo{display:flex;align-items:center;gap:10px}
.logo .mark{width:38px;height:38px;border:1.5px solid var(--line);border-radius:11px}
.logo .name{font-weight:900;font-size:18px;letter-spacing:-.5px}
.logo .name span{color:var(--red)}
.back{margin-left:auto;display:inline-flex;align-items:center;gap:7px;font-size:14px;font-weight:700;color:var(--gray);padding:8px 14px;border-radius:10px;border:1.5px solid var(--line);background:#fff}
.back:hover{border-color:var(--gray-2);color:var(--ink)}
.back svg{width:16px;height:16px}

/* Layout */
main{padding:24px 0 120px}
.card{background:#fff;border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;margin-bottom:18px}
.pad{padding:22px 24px}
.sec-t{font-size:18px;font-weight:900;letter-spacing:-.2px;display:flex;align-items:center;gap:9px;margin-bottom:16px}
.sec-t::before{content:'';width:5px;height:19px;background:var(--red);border-radius:3px}

/* Hero */
.hero-ph{position:relative;height:260px;overflow:hidden;background:var(--bg)}
.hero-ph img{width:100%;height:100%;object-fit:cover}
.hero-ph::after{content:'';position:absolute;inset:0;background:linear-gradient(180deg,transparent 45%,rgba(16,24,40,.45))}
.hero-tags{position:absolute;left:18px;top:16px;right:18px;display:flex;gap:7px;flex-wrap:wrap;z-index:2}
.hero-tags .chip{background:rgba(255,255,255,.94);color:var(--red);box-shadow:0 2px 8px rgba(0,0,0,.12)}
.hero-bd{padding:20px 24px 24px}
.hero-meta{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:8px}
.jcode{font-family:'Inter',monospace;font-size:12.5px;font-weight:800;color:var(--gray-2);letter-spacing:.5px;background:var(--bg);padding:4px 10px;border-radius:7px}
.hero-bd h1{font-size:27px;font-weight:900;letter-spacing:-.4px;line-height:1.32;margin:6px 0 4px}
.hero-co{font-size:14.5px;color:var(--gray);font-weight:700}
.hero-loc{display:inline-flex;align-items:center;gap:6px;font-size:14px;color:var(--ink);font-weight:700;margin-top:10px;background:var(--bg);padding:7px 13px;border-radius:10px}
.hero-loc svg{width:16px;height:16px;color:var(--red)}

/* Salary block */
.sal-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:14px}
.sal-cell{background:var(--bg);border-radius:14px;padding:16px 16px}
.sal-cell .k{font-size:12px;font-weight:800;color:var(--gray-2);letter-spacing:.3px;margin-bottom:5px}
.sal-cell .v{font-size:23px;font-weight:900;color:var(--ink);line-height:1.2}
.sal-cell.main{background:var(--red-soft)}
.sal-cell.main .v{color:var(--red)}
.sal-cell .sub{font-size:11.5px;color:var(--gray);font-weight:600;margin-top:4px}
.sal-note{font-size:13px;color:var(--gray);background:var(--bg);border-radius:12px;padding:12px 14px;line-height:1.65;margin-bottom:14px}
.sal-note b{color:var(--ink)}
.calc-btn{display:inline-flex;align-items:center;gap:7px;font-size:14px;font-weight:800;color:var(--red);border:1.5px solid var(--red-soft);background:var(--red-soft);padding:11px 18px;border-radius:12px}
.calc-btn:hover{background:#fff;border-color:var(--red)}

/* KV table */
.kv{display:grid;grid-template-columns:140px 1fr;gap:0;border-radius:12px;overflow:hidden;border:1px solid var(--line)}
.kv .k,.kv .v{padding:13px 16px;font-size:14px;border-bottom:1px solid var(--line)}
.kv .k{background:var(--bg);font-weight:800;color:var(--gray);font-size:13px}
.kv .v{font-weight:600;color:var(--ink)}
.kv .k:nth-last-child(2),.kv .v:last-child{border-bottom:none}
.kv .v .b{font-weight:800}
.benefits{display:flex;flex-wrap:wrap;gap:7px}

/* Lists */
.dt-list{list-style:none;display:flex;flex-direction:column;gap:9px}
.dt-list li{display:flex;align-items:flex-start;gap:9px;font-size:14.5px;color:#374151}
.dt-list li svg{width:18px;height:18px;flex:0 0 auto;margin-top:3px;color:var(--green)}
.jobdetail-txt{font-size:14.5px;color:#374151;line-height:1.9;margin-bottom:18px}
.subhead{font-size:14px;font-weight:800;color:var(--ink);margin:18px 0 10px}
.subhead:first-child{margin-top:0}
.pillgrid{display:flex;flex-wrap:wrap;gap:8px}
.pill{font-size:13.5px;font-weight:700;background:var(--bg);color:var(--ink);padding:8px 14px;border-radius:11px}
.pill.blue{background:var(--blue-soft);color:var(--blue)}

/* Nearby */
.near-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.near-cell{display:flex;align-items:center;gap:10px;background:var(--bg);border-radius:12px;padding:12px 14px;font-size:14px;font-weight:700}
.near-cell svg{width:18px;height:18px;color:var(--red);flex:0 0 auto}

/* Bottom bar */
.actionbar{position:fixed;left:0;right:0;bottom:0;z-index:60;background:rgba(255,255,255,.96);backdrop-filter:blur(10px);border-top:1px solid var(--line);box-shadow:0 -8px 24px rgba(16,24,40,.08)}
.actionbar .inner{max-width:920px;margin:0 auto;padding:12px 20px;display:flex;align-items:center;gap:12px}
.actionbar .barsal{display:flex;flex-direction:column;line-height:1.2;margin-right:auto}
.actionbar .barsal small{font-size:11px;color:var(--gray-2);font-weight:800}
.actionbar .barsal b{font-size:19px;font-weight:900;color:var(--red)}
.actionbar .applybtn{flex:0 0 auto}

@media(max-width:680px){
  .hero-bd h1{font-size:22px}
  .sal-grid{grid-template-columns:1fr}
  .kv{grid-template-columns:108px 1fr}
  .near-grid{grid-template-columns:1fr}
  .actionbar .barsal{margin-right:8px}
  .actionbar .barsal b{font-size:16px}
  .actionbar .applybtn{padding:13px 18px;font-size:15px}
  .nav .relay{display:none}
}
.empty{text-align:center;padding:70px 20px;color:var(--gray)}
.empty h2{font-size:22px;font-weight:900;color:var(--ink);margin-bottom:10px}
</style>
<script src="biglight-jobs-data.js"></script>
</head>
<body>

<!-- Header -->
<header>
  <div class="nav">
    <a class="logo" href="biglight-job-worker.html">
      <svg class="mark" viewBox="0 0 120 120"><rect x="4" y="4" width="112" height="112" rx="26" fill="#fff"/><circle cx="47" cy="52" r="5" fill="#D02E26"/><path d="M66 52 A8 6 0 0 1 80 52" fill="none" stroke="#D02E26" stroke-width="6" stroke-linecap="round"/><path d="M42 66 A22 22 0 0 0 78 66" fill="none" stroke="#D02E26" stroke-width="8" stroke-linecap="round"/></svg>
      <div class="name">BIGLIGHT<span> JOB</span></div>
    </a>
    <a class="back" href="biglight-job-worker.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M11 18l-6-6 6-6"/></svg>
      求人一覧に戻る
    </a>
  </div>
</header>

<main id="app"></main>

<script>
(function(){
  var JOBS = window.JOBS || [];
  var jobCode = window.jobCode || function(j){return 'JOB-'+j.id;};
  var yen = function(n){return n+'万';};
  var CK = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg>';
  var PIN = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 21s-7-5.2-7-11a7 7 0 0 1 14 0c0 5.8-7 11-7 11z"/><circle cx="12" cy="10" r="2.5"/></svg>';
  var WALK = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="13" cy="4" r="2"/><path d="M11 21l1-6-3-2 1-5 4 3 3 1M9 8l-2 4M14 13l2 4"/></svg>';
  function esc(s){return String(s==null?'':s).replace(/[&<>"']/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];});}
  function jesc(s){return String(s==null?'':s).replace(/\\/g,'\\\\').replace(/'/g,"\\'");}
  function fmtYen(n){return '¥'+Number(n).toLocaleString('ja-JP');}
  function qp(name){return new URLSearchParams(location.search).get(name);}

  function findJob(){
    var code = qp('code'), id = qp('id');
    if(code){var byCode=JOBS.filter(function(j){return jobCode(j)===code;})[0]; if(byCode)return byCode;}
    if(id){var byId=JOBS.filter(function(j){return String(j.id)===String(id);})[0]; if(byId)return byId;}
    return null;
  }

  function goApply(code,title){
    window.location='biglight-job-mypage.html?apply='+encodeURIComponent(code)+'&t='+encodeURIComponent(title);
  }
  window.goApply = goApply;

  var j = findJob();
  var app = document.getElementById('app');

  if(!j){
    app.innerHTML = '<div class="wrap"><div class="card pad empty"><h2>求人が見つかりませんでした</h2><p>お探しの求人は掲載が終了したか、URLが正しくない可能性があります。</p><br><a class="btn btn-red" href="biglight-job-worker.html">求人一覧へ戻る</a></div></div>';
  } else {
    var code = jobCode(j);
    var isMf = j.field.indexOf('製造')>=0, isCon = j.field.indexOf('建設')>=0;
    var fieldClass = isMf?'blue':isCon?'amber':'green';
    var salRange = yen(j.sal[0])+'〜'+yen(j.sal[1])+'円';
    var bs = j.baseSalary||{};
    var hz = j.housing||{};
    var req = j.req||{};

    var heroTags = (j.tags||[]).slice(0,5).map(function(t){return '<span class="chip">'+esc(t)+'</span>';}).join('');
    var benefitsHtml = (j.benefits||[]).map(function(b){return '<span class="chip green">'+esc(b)+'</span>';}).join('');
    var appealHtml = (j.appeal||[]).map(function(a){return '<li>'+CK+'<span>'+esc(a)+'</span></li>';}).join('');
    var idealHtml = (j.idealPerson||[]).map(function(a){return '<span class="pill">'+esc(a)+'</span>';}).join('');
    var qualsHtml = (req.quals||[]).map(function(q){return '<li>'+CK+'<span>'+esc(q)+'</span></li>';}).join('');
    var nearbyHtml = (j.nearby||[]).map(function(n){return '<div class="near-cell">'+WALK+'<span>'+esc(n)+'</span></div>';}).join('');

    app.innerHTML =
    '<div class="wrap">'+

    /* 1) HERO */
    '<div class="card">'+
      '<div class="hero-ph">'+
        '<img src="'+esc(j.img)+'" onerror="this.src=\'https://picsum.photos/seed/'+esc(j.seed)+'/900/500\'" alt="">'+
        '<div class="hero-tags">'+heroTags+'</div>'+
      '</div>'+
      '<div class="hero-bd">'+
        '<div class="hero-meta">'+
          '<span class="jcode">'+esc(code)+'</span>'+
          '<span class="chip '+fieldClass+'">'+esc(j.field)+'</span>'+
          '<span class="chip">'+esc(j.jobType||j.type)+'</span>'+
        '</div>'+
        '<h1>'+esc(j.t)+'</h1>'+
        '<div class="hero-co">'+esc(j.co)+'</div>'+
        '<div class="hero-loc">'+PIN+esc(j.pref)+' '+esc(j.city)+'</div>'+
      '</div>'+
    '</div>'+

    /* 2) 給与 */
    '<div class="card pad">'+
      '<div class="sec-t">給与</div>'+
      '<div class="sal-grid">'+
        '<div class="sal-cell"><div class="k">基本給（'+esc(bs.kind||'')+'）</div><div class="v">'+fmtYen(bs.amount||0)+'</div><div class="sub">'+esc(bs.kind||'')+'</div></div>'+
        '<div class="sal-cell"><div class="k">月収例</div><div class="v">'+fmtYen(j.monthlyExample||0)+'</div><div class="sub">残業・手当を含む目安</div></div>'+
        '<div class="sal-cell main"><div class="k">手取り月収</div><div class="v">'+fmtYen(j.takeHome||0)+'</div><div class="sub">税・社会保険を引いた後</div></div>'+
      '</div>'+
      '<div class="sal-note">'+esc(bs.note||'')+'<br><b>※ 手取り月収</b>は税・社会保険を引いた後の金額です。家賃は含みません。</div>'+
      '<a class="calc-btn" href="biglight-job-salary.html">手取りを計算する '+
        '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 6l6 6-6 6"/></svg></a>'+
    '</div>'+

    /* 3) 募集要項 */
    '<div class="card pad">'+
      '<div class="sec-t">募集要項</div>'+
      '<div class="kv">'+
        '<div class="k">雇用期間</div><div class="v">'+esc(j.employType||'')+'</div>'+
        '<div class="k">勤務時間</div><div class="v">'+esc(j.workHours||'')+'</div>'+
        '<div class="k">残業時間</div><div class="v">'+esc(j.overtime||'')+'</div>'+
        '<div class="k">休日・休暇</div><div class="v">'+esc(j.holidays||'')+'</div>'+
        '<div class="k">通勤手段</div><div class="v">'+esc(j.commute||'')+'</div>'+
        '<div class="k">賞与・昇給</div><div class="v">'+esc(j.bonus||'')+'</div>'+
        '<div class="k">待遇・福利厚生</div><div class="v"><div class="benefits">'+benefitsHtml+'</div></div>'+
      '</div>'+
    '</div>'+

    /* 4) 仕事内容 */
    '<div class="card pad">'+
      '<div class="sec-t">仕事内容</div>'+
      '<div class="jobdetail-txt">'+esc(j.jobDetail||'')+'</div>'+
      '<div class="subhead">アピールポイント</div>'+
      '<ul class="dt-list">'+appealHtml+'</ul>'+
      '<div class="subhead">こんな人が活躍しています</div>'+
      '<div class="pillgrid">'+idealHtml+'</div>'+
    '</div>'+

    /* 5) 応募条件 */
    '<div class="card pad">'+
      '<div class="sec-t">応募条件</div>'+
      '<div class="kv">'+
        '<div class="k">日本語レベル</div><div class="v"><span class="b">'+esc(req.jp||j.jp)+'</span></div>'+
        '<div class="k">入社できる時期</div><div class="v">'+esc(req.startTime||'')+'</div>'+
      '</div>'+
      '<div class="subhead">必要な資格・条件</div>'+
      '<ul class="dt-list">'+qualsHtml+'</ul>'+
    '</div>'+

    /* 6) 住居・生活 */
    '<div class="card pad">'+
      '<div class="sec-t">住居・生活について</div>'+
      '<div class="kv">'+
        '<div class="k">住居タイプ</div><div class="v">'+esc(hz.type||'')+'</div>'+
        '<div class="k">部屋</div><div class="v">'+(hz.privateRoom?'個室':'相部屋')+'</div>'+
        '<div class="k">同居人数</div><div class="v">'+(hz.privateRoom?'なし（1人）':((hz.roommates||0)+'人と同居'))+'</div>'+
        '<div class="k">部屋の説明</div><div class="v">'+esc(hz.roomDesc||'')+'</div>'+
        '<div class="k">家賃</div><div class="v"><span class="b">'+fmtYen(hz.rent||0)+'</span> / 月</div>'+
        '<div class="k">電気・水道・ガス</div><div class="v">'+esc(hz.utilities||'')+'</div>'+
        '<div class="k">インターネット代</div><div class="v">'+esc(hz.internet||'')+'</div>'+
        '<div class="k">その他</div><div class="v">'+esc(hz.misc||'')+'</div>'+
      '</div>'+
    '</div>'+

    /* 7) 近隣情報 */
    '<div class="card pad">'+
      '<div class="sec-t">近隣情報（徒歩15分圏内）</div>'+
      '<div class="near-grid">'+nearbyHtml+'</div>'+
    '</div>'+

    '</div>'; /* /wrap */

    /* Bottom action bar */
    var bar = document.createElement('div');
    bar.className = 'actionbar';
    bar.innerHTML =
      '<div class="inner">'+
        '<div class="barsal"><small>月給</small><b>'+salRange+'</b></div>'+
        '<a class="btn btn-ghost btn-sm relay" href="biglight-job-worker.html#team">相談する</a>'+
        '<button class="btn btn-red btn-lg applybtn" id="applyBtn">この求人に応募する</button>'+
      '</div>';
    document.body.appendChild(bar);
    document.getElementById('applyBtn').addEventListener('click',function(){goApply(code,j.t);});

    document.title = j.t+'｜'+code+'｜BIGLIGHT JOB';
  }
})();
</script>

<style>.fbfab{position:fixed;right:20px;bottom:20px;z-index:90;display:inline-flex;align-items:center;gap:9px;background:#1877F2;color:#fff;padding:13px 18px;border-radius:30px;font-weight:800;font-size:14px;text-decoration:none;box-shadow:0 12px 30px rgba(24,119,242,.45);font-family:'Noto Sans JP',sans-serif;transition:.16s}.fbfab:hover{background:#0C63D4;transform:translateY(-2px)}.fbfab svg{width:22px;height:22px;flex:0 0 auto}@media(max-width:560px){.fbfab span{display:none}.fbfab{padding:15px;border-radius:50%}}</style>
