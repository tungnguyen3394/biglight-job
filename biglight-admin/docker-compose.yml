services:
  db:
    image: postgres:16
    container_name: postgres_biglight_job
    restart: unless-stopped
    environment:
      POSTGRES_USER: biglight_job_user
      POSTGRES_PASSWORD: biglight_job_2026
      POSTGRES_DB: biglight_job_db
    ports:
      - "5432:5432"
    volumes:
      - biglight_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U biglight_job_user -d biglight_job_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  # App (production). For local dev you can run only "db" and use `npm run dev`.
  app:
    build:
      context: .
      args:
        # Compose tự lấy giá trị này từ file .env cùng thư mục
        NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${NEXT_PUBLIC_GOOGLE_CLIENT_ID}
        NEXT_PUBLIC_FACEBOOK_APP_ID: ${NEXT_PUBLIC_FACEBOOK_APP_ID:-}
    container_name: biglight_job_app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # inside the compose network the DB host is the service name "db"
      DATABASE_URL: postgresql://biglight_job_user:biglight_job_2026@db:5432/biglight_job_db?schema=public
    ports:
      - "3000:3000"
    # Nhãn để caddy-docker-proxy tự route domain + cấp HTTPS (giống pgadmin, biglight-web)
    labels:
      caddy: job.biglight.jp
      caddy.reverse_proxy: "{{upstreams 3000}}"
    networks:
      - default   # để app nói chuyện với db
      - web       # để container caddy (mạng web) proxy vào được
    depends_on:
      db:
        condition: service_healthy

  # Service tiện ích: tạo bảng (prisma db push) + seed dữ liệu mẫu.
  # Dùng target "builder" vì nó có sẵn prisma CLI + tsx (devDependencies);
  # image "app" production đã lược bỏ các tool này cho nhẹ.
  # Chạy thủ công khi cần:  docker compose run --rm migrate
  migrate:
    build:
      context: .
      target: builder
      args:
        NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${NEXT_PUBLIC_GOOGLE_CLIENT_ID}
    profiles: ["tools"]
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://biglight_job_user:biglight_job_2026@db:5432/biglight_job_db?schema=public
    depends_on:
      db:
        condition: service_healthy
    command: sh -c "npx prisma db push && npm run db:seed"

networks:
  web:
    external: true   # mạng dùng chung với caddy (đã tạo sẵn bởi infra/)

volumes:
  biglight_pgdata:
